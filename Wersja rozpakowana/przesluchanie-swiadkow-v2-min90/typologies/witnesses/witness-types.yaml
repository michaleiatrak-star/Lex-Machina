witness_types:
  - id: direct
    label: świadek bezpośredni
    strategy: krótkie pytania faktograficzne; kotwiczenie w czasie, miejscu i dokumentach
    risks:
      - luki pamięci
      - nadinterpretacja obserwacji
    recommended_questions:
      - Co Pan/Pani widział/a osobiście?
      - Gdzie Pan/Pani się znajdował/a?
      - Kto jeszcze był obecny?
  - id: indirect
    label: świadek pośredni
    strategy: ustalić źródło wiedzy i oddzielić relację od własnych obserwacji
    risks:
      - zeznania ze słyszenia
      - niska moc dowodowa
  - id: interested
    label: świadek zainteresowany
    strategy: ujawnić interes, następnie konfrontować z dokumentami
    risks:
      - stronniczość
      - lojalność wobec jednej strony
  - id: hostile
    label: świadek wrogi
    strategy: pytania zamknięte, kontrola tempa, impeachment przez sprzeczności
    risks:
      - eskalacja
      - konflikt z sądem
  - id: employer_loyal
    label: lojalny wobec pracodawcy
    strategy: wykazać zależność organizacyjną i porównać zeznania z dokumentami
    risks:
      - lojalnościowa wersja zdarzeń
  - id: expert_like
    label: specjalista/techniczny
    strategy: oddzielić fakty od ocen specjalistycznych; doprecyzować podstawy wiedzy
    risks:
      - pozorna eksperckość poza zakresem sprawy
  - id: uncertain
    label: niepewny
    strategy: nie przeciążać; stosować pytania chronologiczne i neutralne
    risks:
      - podatność na sugestię
  - id: evasive
    label: unikający
    strategy: sekwencja pytań zamkniętych; powrót do pytania; dokument jako kotwica
    risks:
      - brak konkretów
  - id: emotional
    label: emocjonalny
    strategy: uspokoić tempo, skrócić pytania, oddzielić emocje od faktów
    risks:
      - utrata wiarygodności przed formalistycznym sądem
  - id: prepared
    label: przygotowany
    strategy: testować spontaniczność detalami i chronologią
    risks:
      - wyuczona narracja
  - id: documentary
    label: dokumentowy
    strategy: wiązać zeznania z konkretnymi dokumentami, datami i autorstwem
    risks:
      - brak wiedzy własnej poza dokumentem
  - id: memory
    label: pamięciowy
    strategy: chronologia, punkty kotwiczące, kontrola luk
    risks:
      - zniekształcenia pamięci
